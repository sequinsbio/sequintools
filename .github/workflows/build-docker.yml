name: Build Docker Image
on:
  pull_request:
    paths:
      - Dockerfile
      - Cargo.toml
      - Cargo.lock
      - build.rs
      - src/**
jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup docker buildx
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build Docker Image
        uses: useblacksmith/build-push-action@v2
        with:
          push: false
